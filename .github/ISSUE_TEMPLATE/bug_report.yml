name: Bug report
description: Report a reproducible problem with Dimmerly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
        Security vulnerabilities should be reported privately through the security link.
  - type: input
    id: dimmerly-version
    attributes:
      label: Dimmerly version
      description: Open Dimmerly settings or Finder's Get Info panel to find the version.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Homebrew
        - GitHub Releases DMG
        - App Store build
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "macOS 15.5"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "Describe the problem in one or two sentences."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open Dimmerly
        2. Select display ...
        3. Change ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What did you expect Dimmerly to do?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What did Dimmerly do instead?"
    validations:
      required: true
  - type: textarea
    id: displays
    attributes:
      label: Display setup
      description: Include monitor model, connection type, dock/hub/KVM, and whether the issue affects one or all displays.
      placeholder: "Example: LG 27UL850 over USB-C dock, MacBook built-in display also connected."
  - type: textarea
    id: attachments
    attributes:
      label: Logs, screenshots, or recordings
      description: Drag in screenshots, screen recordings, crash reports, or Console excerpts if relevant.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I checked the README troubleshooting and known limitations sections.
          required: true
        - label: This is not a security vulnerability.
          required: true
