name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable SemVer release version to package, for example 1.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install Tooling
        run: brew install swiftformat swiftlint

      - name: Check Formatting
        run: swiftformat Dimmerly DimmerlyTests DimmerlyWidget --config .swiftformat --lint

      - name: Lint
        run: swiftlint lint --quiet --strict

      - name: Run Tests
        run: xcodebuild test -scheme Dimmerly -destination 'platform=macOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Build App Store Scheme
        run: xcodebuild build -project Dimmerly.xcodeproj -scheme "Dimmerly App Store" -configuration Debug-AppStore -destination 'platform=macOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

  signed-dmg:
    name: Signed DMG
    runs-on: macos-15
    needs: quality-gate
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      APPLE_TEAM_ID: MN5C3DH647
      ARCHIVE_PATH: build/Dimmerly.xcarchive
      EXPORT_PATH: build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid stable SemVer version: $VERSION" >&2
            echo "Use MAJOR.MINOR.PATCH, for example 1.0.0. Pre-release suffixes are reserved for release-candidate artifacts, not public signed releases." >&2
            exit 1
          fi

          PROJECT_VERSION="$(xcodebuild -project Dimmerly.xcodeproj -scheme Dimmerly -configuration Release -showBuildSettings \
            | awk -F= '/ MARKETING_VERSION =/ {gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2; exit}')"
          BUILD_NUMBER="$(xcodebuild -project Dimmerly.xcodeproj -scheme Dimmerly -configuration Release -showBuildSettings \
            | awk -F= '/ CURRENT_PROJECT_VERSION =/ {gsub(/^[ \t]+|[ \t]+$/, "", $2); print $2; exit}')"

          if [[ "$PROJECT_VERSION" != "$VERSION" ]]; then
            echo "Tag/input version ($VERSION) does not match MARKETING_VERSION ($PROJECT_VERSION)." >&2
            echo "Update the Xcode project version before packaging the release." >&2
            exit 1
          fi

          if [[ ! "$BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "CURRENT_PROJECT_VERSION must be a positive integer. Current value: $BUILD_NUMBER" >&2
            exit 1
          fi

          {
            echo "RELEASE_VERSION=$VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "DMG_PATH=build/Dimmerly-$VERSION.dmg"
            echo "CHECKSUM_PATH=build/Dimmerly-$VERSION.dmg.sha256"
          } >> "$GITHUB_ENV"

          {
            echo "version=$VERSION"
            echo "build_number=$BUILD_NUMBER"
            echo "dmg_path=build/Dimmerly-$VERSION.dmg"
            echo "checksum_path=build/Dimmerly-$VERSION.dmg.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        run: |
          set -euo pipefail

          VERSION_PATTERN="${RELEASE_VERSION//./\\.}"
          if ! grep -Eq "^## \\[${VERSION_PATTERN}\\]( - [0-9]{4}-[0-9]{2}-[0-9]{2})?$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release heading for ${RELEASE_VERSION}, for example:" >&2
            echo "## [${RELEASE_VERSION}] - YYYY-MM-DD" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            EXPECTED_TAG="v${RELEASE_VERSION}"
            if [[ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]]; then
              echo "Release tag must be ${EXPECTED_TAG}; got ${GITHUB_REF_NAME}." >&2
              exit 1
            fi

            git fetch origin main
            if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "Release tags must point to a commit reachable from origin/main." >&2
              exit 1
            fi
          fi

      - name: Validate release secrets
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPSTORE_CONNECT_API_KEY_ID \
            APPSTORE_CONNECT_ISSUER_ID \
            APPSTORE_CONNECT_API_KEY_BASE64
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secret: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p build
          security create-keychain -p build build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > build/developer-id-certificate.p12
          security import build/developer-id-certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k build build.keychain

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning build.keychain \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')"

          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application signing identity found in imported certificate." >&2
            exit 1
          fi

          echo "DEVELOPER_ID_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail

          mkdir -p private_keys
          echo "$API_KEY_BASE64" | base64 --decode > "private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Archive app
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project Dimmerly.xcodeproj \
            -scheme Dimmerly \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}"

      - name: Export signed app
        run: |
          set -euo pipefail

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions-DeveloperID.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$PWD/private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}"

      - name: Verify app signature
        run: |
          set -euo pipefail

          codesign --verify --deep --strict --verbose=2 "$EXPORT_PATH/Dimmerly.app"

      - name: Verify app bundle metadata
        run: |
          set -euo pipefail

          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$EXPORT_PATH/Dimmerly.app/Contents/Info.plist")"
          APP_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$EXPORT_PATH/Dimmerly.app/Contents/Info.plist")"

          if [[ "$APP_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "Exported app version ($APP_VERSION) does not match release version ($RELEASE_VERSION)." >&2
            exit 1
          fi

          if [[ "$APP_BUILD" != "$BUILD_NUMBER" ]]; then
            echo "Exported app build ($APP_BUILD) does not match CURRENT_PROJECT_VERSION ($BUILD_NUMBER)." >&2
            exit 1
          fi

      - name: Notarize app
        run: |
          set -euo pipefail

          ditto -c -k --keepParent "$EXPORT_PATH/Dimmerly.app" build/Dimmerly-app.zip
          xcrun notarytool submit build/Dimmerly-app.zip \
            --key "private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8" \
            --key-id "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            --issuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --wait
          xcrun stapler staple "$EXPORT_PATH/Dimmerly.app"
          xcrun stapler validate "$EXPORT_PATH/Dimmerly.app"
          spctl --assess --type execute --verbose=4 "$EXPORT_PATH/Dimmerly.app"

      - name: Create DMG
        run: |
          set -euo pipefail

          mkdir -p build/dmg-root
          cp -R "$EXPORT_PATH/Dimmerly.app" build/dmg-root/
          ln -s /Applications build/dmg-root/Applications

          hdiutil create \
            -volname "Dimmerly $RELEASE_VERSION" \
            -srcfolder build/dmg-root \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Sign DMG
        run: |
          set -euo pipefail

          codesign --force --sign "$DEVELOPER_ID_SIGNING_IDENTITY" --timestamp "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize DMG
        run: |
          set -euo pipefail

          xcrun notarytool submit "$DMG_PATH" \
            --key "private_keys/AuthKey_${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}.p8" \
            --key-id "${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}" \
            --issuer "${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}" \
            --wait

      - name: Staple and assess DMG
        run: |
          set -euo pipefail

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"

      - name: Create checksum
        run: |
          set -euo pipefail

          shasum -a 256 "$DMG_PATH" | tee "$CHECKSUM_PATH"

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dimmerly-${{ steps.release_version.outputs.version }}-signed-dmg
          path: |
            ${{ steps.release_version.outputs.dmg_path }}
            ${{ steps.release_version.outputs.checksum_path }}
          if-no-files-found: error

      - name: Create draft GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.release_version.outputs.dmg_path }}
            ${{ steps.release_version.outputs.checksum_path }}
